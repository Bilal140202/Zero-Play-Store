name: EAS Build — PDFX Android

on:
  push:
    branches:
      - master
    paths:
      - 'artifacts/mobile/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'production' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (workspace root)
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Setup Expo EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (${{ github.event.inputs.profile || 'production' }})
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'production' }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build started
        run: |
          echo "✅ EAS build submitted to Expo cloud."
          echo "Track progress at: https://expo.dev/accounts/bilal1402/projects/pdfx/builds"
